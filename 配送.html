<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>配送トラッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Kosugi+Maru&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B2430;
    --surface:#212B39;
    --paper:#EDE7D8;
    --paper-2:#E4DDC9;
    --ink:#22252A;
    --text-light:#EDEAE0;
    --text-muted:#8E97A6;
    --line:#3A4657;
    --stamp-red:#B8402A;
    --stamp-amber:#B9822A;
    --stamp-green:#3B7355;
    --accent:#E7DEC7;
    --radius:3px;
    --pink:#FF8FAB;
    --sky:#6FC3E8;
    --sun:#FFD35C;
    --purple:#9C7BD9;
    --overdue:#FF5A52;
  }
  .anime{font-family:'Kosugi Maru', 'Zen Kaku Gothic New', sans-serif;}
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text-light);
    font-family:'Zen Kaku Gothic New', sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:96px;
  }
  .mono{font-family:'JetBrains Mono', monospace;}

  .topbar{
    padding:28px 20px 16px;
    border-bottom:1px solid var(--line);
  }
  .topbar h1{
    margin:0;
    font-size:22px;
    font-weight:900;
    letter-spacing:.04em;
    display:inline-block;
    position:relative;
  }
  .topbar h1::after{
    content:'';
    position:absolute;
    left:2px; right:2px; bottom:-5px;
    height:5px;
    border-radius:3px;
    background:linear-gradient(90deg, var(--pink), var(--sun), var(--sky));
  }
  .subtitle{
    margin:12px 0 0;
    font-size:13px;
    color:var(--text-muted);
  }
  .summary-bar{
    display:flex;
    align-items:center;
    gap:14px;
    padding:0 20px 12px;
    font-size:13px;
    flex-wrap:wrap;
  }
  .summary-alert{
    color:var(--overdue);
    font-weight:700;
  }
  .summary-ok{
    color:var(--stamp-green);
  }

  .chips{
    display:flex;
    gap:8px;
    padding:14px 20px;
    overflow-x:auto;
  }
  .chip{
    flex:none;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--text-muted);
    border-radius:20px;
    padding:6px 12px;
    cursor:pointer;
  }
  .chip.active{
    border-color:var(--accent);
    color:var(--accent);
  }
  .chip-count{
    opacity:.7;
    margin-left:2px;
  }

  .list{
    padding:4px 16px 20px;
    max-width:640px;
    margin:0 auto;
  }

  .date-group{margin-top:18px;}
  .date-header{
    width:100%;
    background:none;
    border:none;
    color:var(--text-light);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:6px 4px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
  }
  .date-meta{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--text-muted);
    font-weight:400;
  }

  .cards{display:flex; flex-direction:column; gap:22px; margin-top:10px;}

  .card{
    position:relative;
    background:var(--paper);
    color:var(--ink);
    border-radius:var(--radius);
    padding:20px 16px 14px;
    box-shadow:0 6px 14px rgba(0,0,0,.35);
  }
  .card::before{
    content:'';
    position:absolute;
    top:-6px; left:0; right:0; height:12px;
    background-image:radial-gradient(circle at 6px 6px, var(--bg) 4px, transparent 4.5px);
    background-size:12px 12px;
    background-repeat:repeat-x;
  }

  .stamp{
    position:absolute;
    top:10px;
    right:14px;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:12px;
    letter-spacing:.08em;
    border:3px double currentColor;
    border-radius:4px;
    padding:4px 8px;
    transform:rotate(-4deg);
    background:rgba(255,255,255,.35);
    cursor:pointer;
    user-select:none;
  }

  .card-body{padding-right:92px;}

  .tracking-input{
    display:block;
    width:100%;
    border:none;
    background:transparent;
    font-family:'JetBrains Mono', monospace;
    font-size:17px;
    font-weight:700;
    color:var(--ink);
    padding:2px 0;
    border-bottom:1px dashed transparent;
  }
  .tracking-input:focus{
    outline:none;
    border-bottom:1px dashed var(--ink);
  }
  .recipient-input{
    display:block;
    width:100%;
    border:none;
    background:transparent;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:13px;
    color:#4A4438;
    margin-top:4px;
    padding:2px 0;
    border-bottom:1px dashed transparent;
  }
  .recipient-input:focus{
    outline:none;
    border-bottom:1px dashed #4A4438;
  }
  .tracking-input::placeholder, .recipient-input::placeholder{color:#9C9482;}

  .card-actions{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    margin-top:12px;
    padding-top:8px;
    border-top:1px solid #D8D0BA;
  }
  .link-btn{
    background:none;
    border:none;
    padding:0;
    font-size:12px;
    color:#5A5340;
    text-decoration:underline;
    cursor:pointer;
    font-family:'Zen Kaku Gothic New', sans-serif;
  }
  .link-btn.danger{color:var(--stamp-red);}

  .route{margin-top:10px;}
  .route-track{
    position:relative;
    height:10px;
    background:repeating-linear-gradient(90deg, #C9C2B3 0 6px, transparent 6px 12px);
    background-color:#DCD5C3;
    border-radius:6px;
    margin:26px 4px 6px;
  }
  .route-fill{
    position:absolute;
    top:0; left:0; bottom:0;
    border-radius:6px;
    background:linear-gradient(90deg, var(--sky), var(--purple));
    transition:width .6s ease;
  }
  .route-overdue .route-fill{
    background:linear-gradient(90deg, var(--overdue), #C9422E);
  }
  .flag-start, .flag-end{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:16px; height:16px;
    border-radius:50%;
    font-size:9px;
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    font-family:'Kosugi Maru', sans-serif;
  }
  .flag-start{left:-2px; background:#6B7A8F;}
  .flag-end{right:-2px; background:#6B7A8F;}

  .mascot{
    position:absolute;
    bottom:100%;
    transform:translate(-50%, 6px);
    line-height:0;
  }
  .mascot img{
    display:block;
    width:34px;
    height:auto;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.25));
  }
  .mascot.idle img{animation:rch-bob 1.3s ease-in-out infinite;}
  .mascot.arrived img{animation:none;}
  .mascot.alert img{
    animation:rch-shake .35s ease-in-out infinite;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.25)) sepia(1) saturate(6) hue-rotate(-50deg) brightness(.95);
  }
  .alert-badge{
    position:absolute;
    top:-8px;
    right:-6px;
    width:15px; height:15px;
    border-radius:50%;
    background:var(--overdue);
    color:#fff;
    font-family:'Kosugi Maru', sans-serif;
    font-size:10px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  @keyframes rch-bob{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-4px);}
  }
  @keyframes rch-shake{
    0%,100%{transform:rotate(0);}
    25%{transform:rotate(-7deg);}
    75%{transform:rotate(7deg);}
  }

  .route-label{
    font-size:11px;
    color:#5A5340;
    text-align:right;
  }
  .route-label.label-overdue{
    color:var(--overdue);
    font-weight:700;
  }

  .expected-editor{margin-top:8px;}
  .expected-editor summary{
    font-size:11px;
    color:#8A8265;
    cursor:pointer;
    list-style:none;
  }
  .expected-editor summary::-webkit-details-marker{display:none;}
  .expected-editor summary::before{content:'⚙ ';}
  .expected-fields{
    display:flex;
    gap:6px;
    margin-top:6px;
    flex-wrap:wrap;
  }
  .field-mini{
    font-size:12px;
    padding:5px 6px;
    border-radius:4px;
    border:1px solid #C9C2B3;
    background:#F6F3EA;
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
  }

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--text-muted);
  }
  .empty-sub{font-size:13px; max-width:280px; margin:8px auto 0;}

  .fab{
    position:fixed;
    right:20px;
    bottom:24px;
    width:58px;
    height:58px;
    border-radius:50%;
    background:var(--accent);
    color:var(--ink);
    font-size:28px;
    border:none;
    box-shadow:0 6px 16px rgba(0,0,0,.4);
    cursor:pointer;
  }

  .toast-error{
    position:fixed;
    bottom:96px;
    left:50%;
    transform:translateX(-50%);
    background:var(--stamp-red);
    color:#fff;
    padding:8px 16px;
    border-radius:20px;
    font-size:12px;
  }

  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--surface);
    width:100%;
    max-width:480px;
    border-radius:16px 16px 0 0;
    padding:20px 20px 28px;
    max-height:88vh;
    overflow-y:auto;
  }
  .modal h2{
    margin:0 0 12px;
    font-size:16px;
    font-weight:700;
  }
  .modal-preview{
    width:100%;
    max-height:200px;
    object-fit:contain;
    background:#0F1620;
    border-radius:8px;
    margin-bottom:10px;
  }
  .modal-status{
    font-size:12px;
    color:var(--text-muted);
    min-height:16px;
    margin:0 0 12px;
  }
  .modal label{
    display:block;
    font-size:12px;
    color:var(--text-muted);
    margin:10px 0 4px;
  }
  .modal-input{
    width:100%;
    padding:10px 12px;
    border-radius:6px;
    border:1px solid var(--line);
    background:#161E29;
    color:var(--text-light);
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
  }
  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:20px;
  }
  .btn-secondary, .btn-primary{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:none;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    font-family:'Zen Kaku Gothic New', sans-serif;
  }
  .btn-secondary{background:transparent; border:1px solid var(--line); color:var(--text-light);}
  .btn-primary{background:var(--accent); color:var(--ink);}
</style>
</head>
<body>
<div id="app"></div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<div id="modal-root" class="modal-overlay">
  <div class="modal">
    <h2>伝票を追加</h2>
    <img id="modal-preview" class="modal-preview" alt="伝票プレビュー">
    <p id="modal-status" class="modal-status"></p>
    <label for="modal-tracking">追跡番号</label>
    <input id="modal-tracking" class="modal-input" inputmode="numeric" placeholder="12桁の数字">
    <label for="modal-recipient">お届け先（任意）</label>
    <input id="modal-recipient" class="modal-input" placeholder="例：〇〇歯科クリニック">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" onclick="confirmModal()">追加する</button>
    </div>
  </div>
</div>

<script>
const STATUS = {
  shipped:   {label:'発送済み', color:'var(--stamp-red)',   next:'transit'},
  transit:   {label:'配達中',   color:'var(--stamp-amber)', next:'delivered'},
  delivered: {label:'到着済み', color:'var(--stamp-green)', next:null}
};
const STATUS_ORDER = ['shipped','transit','delivered'];

const SLOTS = {
  none: {label:'指定なし', endHour:21},
  am:   {label:'午前中',   endHour:12},
  s14:  {label:'14-16',    endHour:16},
  s16:  {label:'16-18',    endHour:18},
  s18:  {label:'18-20',    endHour:20},
  s19:  {label:'19-21',    endHour:21},
};

function defaultExpectedDate(dateAddedISO){
  const d = new Date(dateAddedISO);
  d.setDate(d.getDate()+1);
  return d.toISOString().slice(0,10);
}
function getExpectedEnd(s){
  const dateStr = s.expectedDate || defaultExpectedDate(s.dateAdded);
  const slot = SLOTS[s.expectedSlot || 'none'];
  return new Date(dateStr+'T'+String(slot.endHour).padStart(2,'0')+':00:00');
}
function computeProgress(s){
  if(s.status==='delivered') return 100;
  const start = new Date(s.dateAdded).getTime();
  const end = getExpectedEnd(s).getTime();
  const now = Date.now();
  if(end<=start) return 100;
  return Math.max(0, Math.min(((now-start)/(end-start))*100, 100));
}
function isOverdue(s){
  if(s.status==='delivered') return false;
  return Date.now() > getExpectedEnd(s).getTime();
}
function remainingLabel(s){
  if(s.status==='delivered') return '到着済み';
  const diffMs = getExpectedEnd(s).getTime() - Date.now();
  if(diffMs<=0){
    const h = Math.round(-diffMs/3600000);
    return h<1 ? '予定時刻を超過' : `予定より約${h}時間遅れ`;
  }
  const h = diffMs/3600000;
  if(h<1) return 'まもなく到着予定';
  if(h<24) return `到着まであと約${Math.round(h)}時間`;
  return `到着まであと約${Math.round(h/24)}日`;
}

let shipments = [];
let filterStatus = 'all';
let collapsedDates = new Set();
let storageError = false;

async function loadShipments(){
  try{
    const res = await window.storage.get('shipments', false);
    shipments = res ? JSON.parse(res.value) : [];
  }catch(e){
    shipments = [];
  }
  render();
}

async function saveShipments(){
  try{
    const result = await window.storage.set('shipments', JSON.stringify(shipments), false);
    storageError = !result;
  }catch(e){
    storageError = true;
  }
}

function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function addSampleData(){
  const now = Date.now();
  const iso = ms => new Date(ms).toISOString();
  const dateOnly = ms => new Date(ms).toISOString().slice(0,10);

  const samples = [
    { trackingNumber:'412345678901', recipient:'さくら歯科クリニック',
      dateAdded: iso(now - 1000*60*30), status:'shipped',
      expectedSlot:'s16' },
    { trackingNumber:'412345678902', recipient:'みなと歯科医院',
      dateAdded: iso(now - 1000*60*60*20), status:'transit',
      expectedDate: dateOnly(now + 1000*60*60*3), expectedSlot:'s14' },
    { trackingNumber:'412345678903', recipient:'あおば矯正歯科',
      dateAdded: iso(now - 1000*60*60*30), status:'transit',
      expectedDate: dateOnly(now - 1000*60*60*6), expectedSlot:'am' },
    { trackingNumber:'412345678904', recipient:'ひかりデンタル提携医院',
      dateAdded: iso(now - 1000*60*60*48), status:'delivered',
      expectedDate: dateOnly(now - 1000*60*60*24), expectedSlot:'s18' },
    { trackingNumber:'412345678905', recipient:'つばさ歯科',
      dateAdded: iso(now - 1000*60*60*2), status:'transit',
      expectedDate: dateOnly(now), expectedSlot:'s19' },
  ];

  samples.forEach(sample=>{
    shipments.unshift({
      id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now())+Math.random()),
      trackingNumber: sample.trackingNumber,
      recipient: sample.recipient,
      dateAdded: sample.dateAdded,
      status: sample.status,
      expectedDate: sample.expectedDate,
      expectedSlot: sample.expectedSlot
    });
  });
  saveShipments();
  render();
}

function addShipment(data){
  shipments.unshift({
    id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now())+Math.random()),
    trackingNumber: data.trackingNumber || '',
    recipient: data.recipient || '',
    dateAdded: new Date().toISOString(),
    status: 'shipped'
  });
  collapsedDates.delete(new Date().toISOString().slice(0,10));
  saveShipments();
  render();
}

function advanceStatus(id){
  const s = shipments.find(x=>x.id===id);
  if(!s) return;
  const next = STATUS[s.status].next;
  if(next){ s.status = next; saveShipments(); render(); }
}
function revertStatus(id){
  const s = shipments.find(x=>x.id===id);
  if(!s) return;
  const idx = STATUS_ORDER.indexOf(s.status);
  if(idx>0){ s.status = STATUS_ORDER[idx-1]; saveShipments(); render(); }
}
function deleteShipment(id){
  if(!confirm('この荷物の記録を削除しますか？')) return;
  shipments = shipments.filter(x=>x.id!==id);
  saveShipments(); render();
}
function updateField(id, field, value){
  const s = shipments.find(x=>x.id===id);
  if(!s) return;
  s[field]=value;
  saveShipments();
}
function setFilter(key){ filterStatus = key; render(); }
function toggleDate(key){
  if(collapsedDates.has(key)) collapsedDates.delete(key); else collapsedDates.add(key);
  render();
}

function groupByDate(list){
  const groups = {};
  for(const s of list){
    const key = s.dateAdded.slice(0,10);
    if(!groups[key]) groups[key]=[];
    groups[key].push(s);
  }
  return Object.entries(groups).sort((a,b)=> b[0].localeCompare(a[0]));
}

function formatDateLabel(key){
  const d = new Date(key+'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((today - d)/(1000*60*60*24));
  const week=['日','月','火','水','木','金','土'];
  const label = `${d.getMonth()+1}月${d.getDate()}日(${week[d.getDay()]})`;
  if(diffDays===0) return `今日・${label}`;
  if(diffDays===1) return `昨日・${label}`;
  return label;
}

function counts(){
  return {
    all: shipments.length,
    shipped: shipments.filter(s=>s.status==='shipped').length,
    transit: shipments.filter(s=>s.status==='transit').length,
    delivered: shipments.filter(s=>s.status==='delivered').length,
  };
}

function chip(key,label,count){
  const active = filterStatus===key ? 'active':'';
  return `<button class="chip ${active}" onclick="setFilter('${key}')">${label} <span class="chip-count">${count}</span></button>`;
}

function emptyState(){
  return `<div class="empty">
    <p>まだ荷物が登録されていません。</p>
    <p class="empty-sub">右下の「＋」から伝票を撮影すると、追跡番号を自動で読み取って登録します。</p>
    <button class="link-btn anime" onclick="addSampleData()">サンプルデータを試す →</button>
  </div>`;

const ROLL_FRAMES = ['lean1','tumble','tumble2','lean2'];
let rollIndex = 0;
function mascotPose(s, overdue){
  if(s.status==='delivered') return {cls:'arrived', pose:'wave'};
  if(overdue) return {cls:'alert', pose:'tumble2'};
  if(s.status==='transit') return {cls:'rolling', pose: ROLL_FRAMES[rollIndex]};
  return {cls:'idle', pose:'stand'};
}
function tickRoll(){
  rollIndex = (rollIndex+1) % ROLL_FRAMES.length;
  document.querySelectorAll('.mascot.rolling img').forEach(img=>{
    img.src = POSES[ROLL_FRAMES[rollIndex]];
  });
}
setInterval(tickRoll, 220);

function renderRoute(s){
  const pct = computeProgress(s);
  const overdue = isOverdue(s);
  const m = mascotPose(s, overdue);
  const expDate = s.expectedDate || defaultExpectedDate(s.dateAdded);
  const expSlot = s.expectedSlot || 'none';
  return `
    <div class="route ${overdue?'route-overdue':''}">
      <div class="route-track">
        <div class="route-fill" style="width:${pct}%"></div>
        <div class="mascot ${m.cls}" style="left:${pct}%">
          <img src="${POSES[m.pose]}" alt="">
          ${overdue?'<span class="alert-badge">!</span>':''}
        </div>
        <div class="flag-start">発</div>
        <div class="flag-end">着</div>
      </div>
      <div class="route-label anime ${overdue?'label-overdue':''}">${overdue?'⚠ ':''}${remainingLabel(s)}</div>
      <details class="expected-editor">
        <summary>到着予定を編集</summary>
        <div class="expected-fields">
          <input type="date" class="field-mini" value="${expDate}" onchange="updateField('${s.id}','expectedDate', this.value)">
          <select class="field-mini" onchange="updateField('${s.id}','expectedSlot', this.value)">
            ${Object.entries(SLOTS).map(([k,v])=>`<option value="${k}" ${expSlot===k?'selected':''}>${v.label}</option>`).join('')}
          </select>
        </div>
      </details>
    </div>`;
}

function renderCard(s){
  const st = STATUS[s.status];
  const digits = (s.trackingNumber||'').replace(/[^0-9]/g,'');
  const trackUrl = digits ? `https://toi.kuronekoyamato.co.jp/cgi-bin/tneko?number00=${digits}` : null;
  return `
  <div class="card" data-id="${s.id}">
    <div class="stamp anime" style="color:${st.color}; border-color:${st.color}" onclick="advanceStatus('${s.id}')" title="タップで次のステータスへ">${st.label}</div>
    <div class="card-body">
      <input class="tracking-input mono" value="${escapeHtml(s.trackingNumber)}" placeholder="追跡番号未入力"
        onchange="updateField('${s.id}','trackingNumber', this.value)">
      <input class="recipient-input" value="${escapeHtml(s.recipient)}" placeholder="お届け先（任意）"
        onchange="updateField('${s.id}','recipient', this.value)">
      ${renderRoute(s)}
      <div class="card-actions">
        ${s.status!=='shipped' ? `<button class="link-btn" onclick="revertStatus('${s.id}')">← 一つ戻す</button>`:''}
        ${trackUrl ? `<a class="link-btn" href="${trackUrl}" target="_blank" rel="noopener">追跡ページを開く</a>`:''}
        <button class="link-btn danger" onclick="deleteShipment('${s.id}')">削除</button>
      </div>
    </div>
  </div>`;
}

function renderSummary(){
  if(shipments.length===0) return '';
  const active = shipments.filter(s=>s.status!=='delivered');
  const overdueCount = active.filter(isOverdue).length;
  return `<div class="summary-bar anime">
    <span>配達中 <strong class="mono">${active.length}</strong>件</span>
    ${overdueCount>0
      ? `<span class="summary-alert">⚠ 予定超過 ${overdueCount}件</span>`
      : `<span class="summary-ok">✓ 順調に配達中</span>`}
  </div>`;
}

function renderGroup(key, items){
  const collapsed = collapsedDates.has(key);
  return `
  <section class="date-group">
    <button class="date-header" onclick="toggleDate('${key}')">
      <span>${formatDateLabel(key)}</span>
      <span class="date-meta mono">${items.length}件 ${collapsed?'▸':'▾'}</span>
    </button>
    ${collapsed?'':`<div class="cards">${items.map(renderCard).join('')}</div>`}
  </section>`;
}

function resizeImageToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxW = 1000;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width*scale);
        canvas.height = Math.round(img.height*scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        resolve(dataUrl.split(',')[1]);
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function extractTrackingInfo(base64){
  const prompt = `この画像はヤマト運輸の発送伝票（お客様控えまたは送り状）です。以下を読み取り、JSON形式のみで回答してください。説明文やコードブロック記号（\`\`\`）は一切含めないでください。
{"trackingNumber": "12桁の数字のみ、ハイフンなし。読み取れない場合はnull", "recipient": "お届け先の会社名・宛名。読み取れない場合はnull"}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      messages:[{
        role:"user",
        content:[
          {type:"image", source:{type:"base64", media_type:"image/jpeg", data: base64}},
          {type:"text", text: prompt}
        ]
      }]
    })
  });
  const data = await response.json();
  const textBlock = (data.content||[]).find(b=>b.type==='text');
  if(!textBlock) throw new Error('no text in response');
  const clean = textBlock.text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

document.getElementById('cameraInput').addEventListener('change', handleFile);

async function handleFile(e){
  const file = e.target.files[0];
  e.target.value='';
  if(!file) return;
  openModal();
  try{
    const base64 = await resizeImageToBase64(file);
    setModalPreview(base64);
    setModalStatus('伝票を解析中…');
    try{
      const result = await extractTrackingInfo(base64);
      fillModalForm(result);
      setModalStatus(result.trackingNumber ? '' : '追跡番号を自動で読み取れませんでした。手動で入力してください。');
    }catch(err){
      setModalStatus('自動読み取りに失敗しました。手動で入力してください。');
    }
  }catch(err){
    setModalStatus('画像の読み込みに失敗しました。');
  }
}

function openModal(){
  document.getElementById('modal-root').classList.add('open');
  document.getElementById('modal-preview').src='';
  document.getElementById('modal-tracking').value='';
  document.getElementById('modal-recipient').value='';
  setModalStatus('画像を読み込み中…');
}
function closeModal(){
  document.getElementById('modal-root').classList.remove('open');
}
function setModalPreview(base64){
  document.getElementById('modal-preview').src = 'data:image/jpeg;base64,'+base64;
}
function setModalStatus(text){
  document.getElementById('modal-status').textContent = text;
}
function fillModalForm(result){
  document.getElementById('modal-tracking').value = result.trackingNumber || '';
  document.getElementById('modal-recipient').value = result.recipient || '';
}
function confirmModal(){
  const trackingNumber = document.getElementById('modal-tracking').value.trim();
  const recipient = document.getElementById('modal-recipient').value.trim();
  addShipment({trackingNumber, recipient});
  closeModal();
}

function tickProgress(){
  document.querySelectorAll('.card').forEach(card=>{
    const id = card.dataset.id;
    const s = shipments.find(x=>x.id===id);
    if(!s) return;
    const pct = computeProgress(s);
    const overdue = isOverdue(s);
    const routeEl = card.querySelector('.route');
    const fill = card.querySelector('.route-fill');
    const mascot = card.querySelector('.mascot');
    const label = card.querySelector('.route-label');
    if(routeEl) routeEl.classList.toggle('route-overdue', overdue);
    if(fill) fill.style.width = pct+'%';
    if(mascot){
      mascot.style.left = pct+'%';
      const m = mascotPose(s, overdue);
      if(!mascot.classList.contains(m.cls)){
        mascot.className = 'mascot '+m.cls;
        mascot.innerHTML = `<img src="${POSES[m.pose]}" alt="">` + (overdue?'<span class="alert-badge">!</span>':'');
      }
    }
    if(label){
      label.textContent = (overdue?'⚠ ':'') + remainingLabel(s);
      label.classList.toggle('label-overdue', overdue);
    }
  });
}
setInterval(tickProgress, 60000);

window.addEventListener('DOMContentLoaded', loadShipments);
</script>
</body>
</html>
